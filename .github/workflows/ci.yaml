name: Node CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: action/checkout@v6
      - name: Setup Node
        uses: action/setup-node@v6
        with:
          node-version: latest
      - name: Install Dependencies
        run: npm ci # Clean Install
      - name: Run Tests
        run: npm test
